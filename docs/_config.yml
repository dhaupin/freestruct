title: freestruct
description: SEO layer for static doc sites
theme: null

# Theme includes (copy to _layouts, _includes, assets)
include:
  - _theme

# Search
search:
  provider: pagefind

# Navigation
nav:
  - title: Home
    url: /
  - title: Getting Started
    url: /getting-started
  - title: Configuration
    url: /configuration

# Markdown
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

permalink: pretty

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: page
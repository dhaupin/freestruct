title: freestruct
description: SEO layer for static doc sites
url: https://dhaupin.github.io/freestruct
baseurl: ""

# Theme
theme: null
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# SEO
seo:
  name: freestruct
  title: false
  description: "{description}"
  url: "{url}{baseurl}"
  logo: 
  twitter:
    username: "@dhaupin"
  og:
    image: /assets/og-image.png

# Search
search:
  provider: pagefind

# Navigation
nav:
  - title: Home
    url: /
  - title: Getting Started
    url: /getting-started
  - title: Configuration
    url: /configuration

# Markdown
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

permalink: pretty

# Sass
sass:
  sass_dir: assets/scss
  style: compressed

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: page
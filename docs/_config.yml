title: freestruct
description: SEO layer for static doc sites
url: http://freestruct.creadev.org
baseurl:

# Theme
theme: null
# plugins:
#   - jekyll-sitemap  # removed - freestruct generates sitemap.xml

# Search
search:
  provider: pagefind

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

permalink: pretty

# Sass
sass:
  sass_dir: assets/scss
  style: compressed

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: page

# Navigation - dynamic from docs folder structure
nav_sections:
  guides: "Guides"
  contributing: "Contributing"

nav_order:
  index: 0
  getting-started: 1
  configuration: 2
  guides: 10
  contributing: 20

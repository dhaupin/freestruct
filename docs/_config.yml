title: freestruct
description: SEO layer for static doc sites
url: https://dhaupin.github.io/freestruct
baseurl: /freestruct

# freestruct SEO config
ssr:
  site:
    url: https://dhaupin.github.io/freestruct
    name: freestruct
    description: SEO layer for static doc sites
  author:
    name: dhaupin
    url: https://github.com/dhaupin
  twitter:
    username: "@dhaupin"
    card: summary
  og:
    image: /freestruct/assets/og-image.png
    locale: en_US
    type: website

# Theme
theme: null
plugins:
  - jekyll-sitemap

# Search
search:
  provider: pagefind

# Navigation
nav:
  - title: Home
    url: /
  - title: Getting Started
    url: /getting-started
  - title: Configuration
    url: /configuration

# Markdown
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

permalink: pretty

# Sass
sass:
  sass_dir: assets/scss
  style: compressed

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: page
<!DOCTYPE html>
<html lang="{{ page.lang | default: 'en' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  {% seo %}
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="{{ '/assets/main.css' | relative_url }}" rel="stylesheet">
  
  {% if site.search.provider == 'pagefind' %}
  <link rel="stylesheet" href="{{ '/pagefind/pagefind-ui.css' | relative_url }}">
  {% endif %}
</head>
<body>
  {% include header.html %}
  
  <main class="site-main">
    <div class="container">
      {{ content }}
    </div>
  </main>
  
  {% include footer.html %}
  
  {% if site.search.provider == 'pagefind' %}
  <script src="{{ '/pagefind/pagefind-ui.js' | relative_url }}" defer></script>
  {% endif %}
</body>
</html>

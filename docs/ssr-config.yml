# Site configuration
site:
  name: freestruct
  url: https://freestruct.creadev.org
  description: Post-build SEO layer for static docs

# Twitter Cards
twitter:
  username: "@yourhandle"
  card: summary

# Open Graph
og:
  image: /og-image.png
  type: website
  locale: en_US

# Base path to strip from URLs
basePath: 

# Generate sitemap.xml
generateSitemap: true

# Generate 404.html
generate404: true

# Generate robots.txt
generateRobots: true

# Minify HTML (experimental, off by default)
# minify: true

# Preserve existing meta tags (default: true)
preserveExistingMeta: true

# Cache busting
cacheBusting:
  hash: true
  # hashInCanonicalUrl: false
  # assetQueryParam: true

# Purge hooks (optional)
# cacheBusting:
#   purge:
#     - cloudflare

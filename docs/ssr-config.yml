# freestruct SEO config - all meta, OG, Twitter, and JSON-LD defined here
# This file powers inject-brand.html - user sets nothing in the template

# Output directory from SSG build
outputDir: docs/_site  # Jekyll: _site, Hugo: public/, Gatsby: dist/

# Base path to strip from URLs (e.g., /freestruct from /freestruct/docs/foo)
basePath: 

# Preserve existing meta tags (default: true)
# If true, freestruct only injects missing tags (no duplicates)
# Set to false to remove existing SEO tags before injecting
preserveExistingMeta: true

site:
  url: http://freestruct.creadev.org
  name: freestruct
  description: SEO layer for static doc sites

author:
  name: dhaupin
  url: https://github.com/dhaupin

# Twitter Card meta
twitter:
  username: "@dhaupin"
  card: summary

# Open Graph
og:
  image: /assets/og-image.png
  locale: en_US
  type: website

# Keywords for search engines
keywords:
  - SEO
  - prerender
  - static site generator
  - jekyll
  - hugo
  - docusaurus
  - documentation

# JSON-LD Structured Data
jsonLd:
  - "@context": "https://schema.org"
    "@type": "Organization"
    name: freestruct
    url: http://freestruct.creadev.org
    description: SEO layer for static doc sites
    sameAs:
      - https://github.com/dhaupin/freestruct

  - "@context": "https://schema.org"
    "@type": "WebSite"
    name: freestruct
    url: http://freestruct.creadev.org
    potentialAction:
      "@type": "SearchAction"
      target:
        "@type": "EntryPoint"
        urlTemplate: http://freestruct.creadev.org/?s={search_term_string}
      query-input: required name=search_term_string
# Site configuration
site:
  name: freestruct
  url: https://freestruct.creadev.org
  description: Post-build SEO layer for static docs

# Twitter Cards
twitter:
  username: "@yourhandle"
  card: summary

# Open Graph
og:
  image: /og-image.png
  type: website
  locale: en_US

# Base path to strip from URLs
basePath: 

# Generate sitemap.xml
generateSitemap: true

# Generate 404.html
generate404: true

# Generate robots.txt
generateRobots: true

# Minify HTML (experimental, off by default)
# minify: true

# Preserve existing meta tags
preserveExistingMeta: true

# Cache busting
cacheBusting:
  hash: true

# Generate RSS feed (on by default)
generateFeed: true

# Inject reading time (on by default)
readingTime: true

# Inject last modified (on by default)
lastModified: true

# Add lazy loading to images (on by default)
lazyLoad: true

# Check internal links (on by default)
linkCheck: true

# Generate search.json (on by default)
searchIndex: true

# Extract APIs from source for docs (on by default)
extractApis: true

# Chunk docs for RAG/LLM (on by default)
chunkForRag: true

# Extract @example from JSDoc (on by default)
extractExamples: true

# Generate sidebar nav (on by default)
generateSidebar: true

# Inject heading IDs (on by default)
injectHeadingIds: true

# Extract types from JSDoc (on by default)
extractTypes: true

# Get modified dates from git (on by default)
getGitModified: true

# Index internal links (on by default)
indexLinks: true

# Priority sitemap (on by default)
generateSitemapPriority: true

# Generate TOC from markdown (on by default)
generateToc: true

# SEO score per page (on by default)
seoScore: true

# Extract frontmatter (on by default)
extractFrontmatter: true

# Detect code languages (on by default)
detectLanguages: true

# Word stats (on by default)
wordStats: true

# Find orphan pages (on by default)
findOrphans: true

# Generate breadcrumbs (on by default)
breadcrumbs: true

# Structured data (on by default)
structuredData: true

# Hreflang i18n (on by default)
hreflangs: true

# Extract FAQ (on by default)
extractFaq: true

# Meta summary (on by default)
metaSummary: true

# Find duplicate titles (on by default)
duplicateTitles: true

# Extract images (on by default)
extractImages: true

# Extract all links (on by default)
extractAllLinks: true

# Find missing alt (on by default)
missingAlt: true

# View transitions config (on by default)
viewTransitions: true

# Extract keywords (on by default)
extractKeywords: true

# Depth score (on by default)

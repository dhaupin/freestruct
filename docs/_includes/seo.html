{% comment %}Manual SEO meta tags - replaces jekyll-seo-tag plugin{% endcomment %}
<title>{{ page.title | default: site.title }}{% if page.title and site.title %} | {% endif %}{{ site.title }}</title>
<meta name="description" content="{{ page.description | default: site.description }}">
<link rel="canonical" href="{{ site.url }}{{ page.url }}">

<!-- Open Graph -->
<meta property="og:title" content="{{ page.title | default: site.title }}">
<meta property="og:description" content="{{ page.description | default: site.description }}">
<meta property="og:url" content="{{ site.url }}{{ page.url }}">
<meta property="og:site_name" content="{{ site.title }}">
<meta property="og:type" content="website">
<meta property="og:locale" content="en_US">

<!-- Twitter -->
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="{{ page.title | default: site.title }}">
{% if site.twitter.username %}
<meta name="twitter:site" content="{{ site.twitter.username }}">
<meta name="twitter:creator" content="{{ site.twitter.username }}">
{% endif %}

<!-- JSON-LD Schemas -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "{{ site.title }}",
  "url": "{{ site.url }}",
  "description": "{{ site.description }}",
  "sameAs": [
    "https://github.com/dhaupin/freestruct"
  ]
}
</script>

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "{{ site.title }}",
  "url": "{{ site.url }}",
  "potentialAction": {
    "@type": "SearchAction",
    "target": {
      "@type": "EntryPoint",
      "urlTemplate": "{{ site.url }}/?s={search_term_string}"
    },
    "query-input": "required name=search_term_string"
  }
}
</script>

<!-- SEO meta tags template - freestruct reads this and injects per-page values -->
<!-- Placeholders: {{pageTitle}}, {{pageDescription}}, {{pageUrl}}, {{canonicalUrl}} -->
<!-- Config values: {{siteUrl}}, {{siteName}}, {{siteDescription}}, {{twitterUsername}}, {{twitterCard}}, {{ogImage}}, {{ogType}}, {{ogLocale}} -->

<title>{{pageTitle}}</title>
<meta name="description" content="{{pageDescription}}">
<link rel="canonical" href="{{canonicalUrl}}">

<!-- Open Graph -->
<meta property="og:title" content="{{pageTitle}}">
<meta property="og:description" content="{{pageDescription}}">
<meta property="og:url" content="{{pageUrl}}">
<meta property="og:site_name" content="{{siteName}}">
<meta property="og:type" content="{{ogType}}">
<meta property="og:locale" content="{{ogLocale}}">
<meta property="og:image" content="{{siteUrl}}{{ogImage}}">

<!-- Twitter -->
<meta name="twitter:card" content="{{twitterCard}}">
<meta name="twitter:title" content="{{pageTitle}}">
<meta name="twitter:site" content="{{twitterUsername}}">
<meta name="twitter:creator" content="{{twitterUsername}}">

<!-- JSON-LD -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "{{siteName}}",
  "url": "{{siteUrl}}",
  "description": "{{siteDescription}}",
  "sameAs": ["https://github.com/dhaupin/freestruct"]
}
</script>

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "{{siteName}}",
  "url": "{{siteUrl}}",
  "potentialAction": {
    "@type": "SearchAction",
    "target": {
      "@type": "EntryPoint",
      "urlTemplate": "{{siteUrl}}/?s={search_term_string}"
    },
    "query-input": "required name=search_term_string"
  }
}
</script>

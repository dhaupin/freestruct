<header class="site-header">
  <div class="container">
    <a href="{{ '/' | relative_url }}" class="site-logo">
      {{ site.title }}<span class="nav-badge">beta</span>
    </a>

    <button class="burger-menu" id="burgerMenu" aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav class="site-nav" id="siteNav">
      {% if site.nav %}
        {% for item in site.nav %}
          {% if item.items %}
          <div class="nav-group">
            <button class="nav-group-toggle" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')">
              {{ item.title }}
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
            </button>
            <div class="nav-group-items">
              {% for sub in item.items %}
              <a href="{{ sub.url | relative_url }}">{{ sub.title }}</a>
              {% endfor %}
            </div>
          </div>
          {% else %}
          <a href="{{ item.url | relative_url }}">{{ item.title }}</a>
          {% endif %}
        {% endfor %}
      {% endif %}
      
      <div class="nav-right">
        <div class="search-bar">
          <input type="text" class="search-bar-input" id="searchBarInput" placeholder="Search..." autocomplete="off">
          <button class="search-trigger" id="searchTrigger" aria-label="Search" onclick="document.getElementById('searchModal').classList.add('open')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/>
              <path d="M21 21l-4.35-4.35"/>
            </svg>
          </button>
        </div>
        <kbd class="search-bar-shortcut"></kbd>
        
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme" onclick="toggleTheme()">
          <svg class="sun-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
          <svg class="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
        
        <a href="https://github.com/dhaupin/freestruct" target="_blank" rel="noopener">GitHub</a>
      </div>
    </nav>
  </div>
</header>

<div class="search-modal" id="searchModal">
  <div class="search-modal-content">
    <input type="text" class="search-input" id="searchInput" placeholder="Search docs..." autocomplete="off">
    <div class="search-results" id="searchResults"></div>
    <button class="search-close" id="searchClose" aria-label="Close search">×</button>
  </div>
</div>

<script>
// Theme toggle
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.classList.contains('dark');
  html.classList.toggle('dark');
  localStorage.setItem('theme', isDark ? 'light' : 'dark');
}

// Load theme on init
(function() {
  const saved = localStorage.getItem('theme');
  const prefers = window.matchMedia('(prefers-color-scheme: dark)').matches;
  if (saved === 'dark' || (!saved && prefers)) {
    document.documentElement.classList.add('dark');
  }
})();
</script>

<script>
// Burger menu
var burger = document.getElementById('burgerMenu');
var nav = document.getElementById('siteNav');
if (burger && nav) {
  burger.addEventListener('click', function() {
    burger.classList.toggle('open');
    nav.classList.toggle('open');
  });
}

// Close nav on link click (mobile)
document.querySelectorAll('#siteNav a').forEach(function(link) {
  link.addEventListener('click', function() {
    nav.classList.remove('open');
    burger.classList.remove('open');
  });
});
</script>

<script>
// Search
var pagefind = null;
var pagefindPath = '/pagefind/pagefind.js';

async function initPagefind() {
  if (pagefind) return pagefind;
  pagefind = await import(pagefindPath);
  await pagefind.init();
  return pagefind;
}

window.doSearch = async function(q, resultsEl) {
  if (q.length < 2) {
    resultsEl.innerHTML = '';
    return;
  }
  resultsEl.innerHTML = '<div style="padding:1rem 1.25rem;color:var(--color-text-muted)">Loading...</div>';
  try {
    var pf = await initPagefind();
    var resp = await pf.search(q);
    if (resp.results.length === 0) {
      resultsEl.innerHTML = '<div style="padding:1rem 1.25rem;color:var(--color-text-muted)">No results found</div>';
      return;
    }
    var html = '';
    for (var i = 0; i < resp.results.length && i < 8; i++) {
      var r = resp.results[i];
      var data = await r.data();
      html += '<a href="' + data.url + '" class="search-result"><div class="search-result-title">' + (data.meta?.title || data.url) + '</div>';
      if (data.excerpt) html += '<div class="search-result-excerpt">' + data.excerpt + '</div>';
      html += '</a>';
    }
    resultsEl.innerHTML = html;
  } catch (e) {
    resultsEl.innerHTML = '<div style="padding:1rem 1.25rem;color:var(--color-text-muted)">Search unavailable</div>';
  }
};
</script>
<script>
var searchModal=document.getElementById('searchModal');
var searchInput=document.getElementById('searchInput');
var searchResults=document.getElementById('searchResults');
var searchClose=document.getElementById('searchClose');
var searchBarInput=document.getElementById('searchBarInput');

document.addEventListener('keydown',function(e){
  if(!searchModal)return;
  if(e.key==='Escape')searchModal.classList.remove('open');
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();searchModal.classList.add('open');searchInput.focus();}
});
if(searchClose)searchClose.addEventListener('click',function(){searchModal.classList.remove('open')});
if(searchInput)searchInput.addEventListener('input',function(){doSearch(this.value,searchResults)});
if(searchBarInput)searchBarInput.addEventListener('focus',function(){
  searchModal.classList.add('open');
  searchInput.value=this.value;
  searchInput.focus();
  doSearch(this.value,searchResults);
});
</script>

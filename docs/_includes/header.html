<header class="site-header">
  <div class="container">
    <a href="{{ '/' | relative_url }}" class="site-logo">
      freestruct<span class="nav-badge">v0.1</span>
    </a>
    
    <nav class="site-nav">
      <a href="{{ '/getting-started' | relative_url }}">Getting Started</a>
      <a href="{{ '/configuration' | relative_url }}">Configuration</a>
      <button class="search-button" id="search-trigger">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <path d="M21 21l-4.35-4.35"/>
        </svg>
        Search
        <kbd>⌘K</kbd>
      </button>
      <a href="https://github.com/dhaupin/freestruct" target="_blank" rel="noopener">GitHub</a>
    </nav>
  </div>
</header>

<div id="search-modal" class="search-modal" hidden>
  <div class="search-modal-content">
    <div id="search"></div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var trigger = document.getElementById('search-trigger');
  var modal = document.getElementById('search-modal');
  
  if (trigger && modal) {
    trigger.addEventListener('click', function(e) {
      e.preventDefault();
      modal.hidden = false;
      setTimeout(() => document.querySelector('#search .pagefind-ui__search-input')?.focus(), 100);
    });
    
    modal.addEventListener('click', function(e) {
      if (e.target === modal) modal.hidden = true;
    });
    
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && !modal.hidden) modal.hidden = true;
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        modal.hidden = false;
        setTimeout(() => document.querySelector('#search .pagefind-ui__search-input')?.focus(), 100);
      }
    });
  }
});
</script>

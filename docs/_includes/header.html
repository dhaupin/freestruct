<header class="site-header">
  <div class="container">
    <a href="{{ '/' | relative_url }}" class="site-logo">
      freestruct<span class="nav-badge">v0.1</span>
    </a>
    
    <nav class="site-nav">
      <a href="{{ '/getting-started' | relative_url }}">Getting Started</a>
      <a href="{{ '/configuration' | relative_url }}">Configuration</a>
      <div class="search-bar">
        <input type="text" class="search-bar-input" id="searchBarInput" placeholder="Search..." autocomplete="off">
        <button class="search-trigger" id="searchTrigger" aria-label="Search">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <path d="M21 21l-4.35-4.35"/>
          </svg>
        </button>
      </div>
      <kbd class="search-bar-shortcut"></kbd>
      <a href="https://github.com/dhaupin/freestruct" target="_blank" rel="noopener">GitHub</a>
    </nav>
  </div>
</header>

<div class="search-modal" id="searchModal">
  <div class="search-modal-content">
    <input type="text" class="search-input" id="searchInput" placeholder="Search docs..." autocomplete="off">
    <div class="search-results" id="searchResults"></div>
    <button class="search-close" id="searchClose" aria-label="Close search">×</button>
  </div>
</div>

<script>
var searchTrigger=document.getElementById('searchTrigger');
var searchModal=document.getElementById('searchModal');
var searchInput=document.getElementById('searchInput');
var searchResults=document.getElementById('searchResults');
var searchBarInput=document.getElementById('searchBarInput');
var searchClose=document.getElementById('searchClose');
var pagefind;
function initPagefind(){
  if(pagefind)return;
  pagefind=new Pagefind();
}
async function doSearch(q,output){
  if(!q){output.innerHTML='';return;}
  initPagefind();
  try{
    var res=await pagefind.search(q);
    var html='';
    res.results.slice(0,5).forEach(function(x){
      html+='<a href="'+x.url+'" class="search-result"><div class="search-result-title">'+(x.meta?.title||x.url)+'</div>';
    });
    output.innerHTML=html||'<div class="search-result"><div class="search-result-title">No results</div></div>';
  }catch(e){
    output.innerHTML='<div class="search-result"><div class="search-result-title">Search unavailable</div></div>';
  }
}
if(searchTrigger&&searchModal){
  searchTrigger.addEventListener('click',function(){searchModal.classList.add('open');searchInput.focus()});
  searchClose.addEventListener('click',function(){searchModal.classList.remove('open')});
  searchInput.addEventListener('input',function(){doSearch(this.value,searchResults)});
  searchBarInput.addEventListener('focus',function(){
    searchModal.classList.add('open');
    searchInput.value=this.value;
    searchInput.focus();
    doSearch(this.value,searchResults);
  });
  document.addEventListener('keydown',function(e){
    if(e.key==='Escape')searchModal.classList.remove('open');
    if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();searchModal.classList.add('open');searchInput.focus();}
    if(e.key==='k'&&searchBarInput===document.activeElement){e.preventDefault();searchModal.classList.add('open');searchInput.focus();}
  });
}
</script>

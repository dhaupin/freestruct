<header class="site-header">
  <div class="container">
    <a href="{{ '/' | relative_url }}" class="site-logo">
      freestruct<span class="nav-badge">v0.1</span>
    </a>
    
    <nav class="site-nav">
      <a href="{{ '/getting-started' | relative_url }}">Getting Started</a>
      <a href="{{ '/configuration' | relative_url }}">Configuration</a>
      <button class="search-button" id="search-trigger" aria-label="Open search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <path d="M21 21l-4.35-4.35"/>
        </svg>
        Search
        <kbd>⌘K</kbd>
      </button>
      <a href="https://github.com/dhaupin/freestruct" target="_blank" rel="noopener">GitHub</a>
    </nav>
  </div>
</header>

<div id="search-modal" class="search-modal" style="display:none">
  <div class="search-modal-content">
    <div id="search"></div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var trigger = document.getElementById('search-trigger');
  var modal = document.getElementById('search-modal');
  
  if (trigger && modal) {
    trigger.addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      console.log('CLICK');
      modal.style.display = 'flex';
      console.log('modal now:', modal.style.display);
      setTimeout(function() {
        var input = document.querySelector('#search .pagefind-ui__search-input');
        if (input) {
          input.focus();
          console.log('focused');
        } else {
          console.log('no input found');
        }
      }, 1000);
    });
    
    modal.addEventListener('click', function(e) {
      if (e.target === modal) modal.style.display = 'none';
    });
    
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') modal.style.display = 'none';
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        modal.style.display = 'flex';
      }
    });
  }
});
</script>

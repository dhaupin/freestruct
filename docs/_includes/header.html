<header class="site-header">
  <div class="container">
    <a href="{{ '/' | relative_url }}" class="site-logo">
      freestruct<span class="nav-badge">v0.1</span>
    </a>
    
    <nav class="site-nav">
      <a href="{{ '/getting-started' | relative_url }}">Getting Started</a>
      <a href="{{ '/configuration' | relative_url }}">Configuration</a>
      <button class="search-button" id="search-trigger">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <path d="M21 21l-4.35-4.35"/>
        </svg>
        Search
        <kbd>⌘K</kbd>
      </button>
      <a href="https://github.com/dhaupin/freestruct" target="_blank" rel="noopener">GitHub</a>
    </nav>
  </div>
</header>

<div id="search-modal" class="search-modal" hidden>
  <div class="search-modal-content">
    <div class="search-modal-header">
      <input type="text" id="search-input" class="search-input" placeholder="Search docs..." autocomplete="off">
      <button class="search-close" id="search-close">✕</button>
    </div>
    <div id="search-results"></div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var trigger = document.getElementById('search-trigger');
  var modal = document.getElementById('search-modal');
  var input = document.getElementById('search-input');
  var close = document.getElementById('search-close');
  var results = document.getElementById('search-results');
  
  if (trigger && modal && input) {
    trigger.addEventListener('click', function(e) {
      e.preventDefault();
      modal.hidden = false;
      input.focus();
    });
    
    close?.addEventListener('click', function() {
      modal.hidden = true;
    });
    
    modal.addEventListener('click', function(e) {
      if (e.target === modal) modal.hidden = true;
    });
    
    // Search as you type
    input.addEventListener('input', async function() {
      var q = this.value.trim();
      if (q.length < 2) {
        results.innerHTML = '<p class="search-hint">Type to search...</p>';
        return;
      }
      try {
        var pf = await import('/pagefind/pagefind.js');
        var search = await pf.search(q, { limit: 5 });
        if (search?.results?.length) {
          results.innerHTML = '<ul class="search-list">' + 
            search.results.map(r => 
              '<li><a href="' + r.url + '">' + (r.meta?.title || r.url.replace('/','').replace('.html','') || 'Page') + '</a></li>'
            ).join('') + 
          '</ul>';
        } else {
          results.innerHTML = '<p class="search-empty">No results for "' + q + '"</p>';
        }
      } catch (e) {
        console.error('Search error:', e);
        results.innerHTML = '<p class="search-error">Search unavailable</p>';
      }
    });
    
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && !modal.hidden) modal.hidden = true;
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        modal.hidden = false;
        input.focus();
      }
    });
  }
});
</script>
